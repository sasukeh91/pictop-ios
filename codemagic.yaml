workflows:
  ios-workflow:
    name: PicTop iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: v20
      groups:
        - ios_build
      vars:
        APP_ID: ro.pictop.app
        APP_NAME: "PicTop"
    scripts:
      - name: Prepare API key
        script: |
          echo "$ASC_KEY_B64" | base64 -d | tr -d '\r' > /tmp/AuthKey.p8
          echo "=== Key debug ==="
          head -1 /tmp/AuthKey.p8
          tail -1 /tmp/AuthKey.p8
          echo "Lines: $(wc -l < /tmp/AuthKey.p8)"
          openssl pkey -in /tmp/AuthKey.p8 -check -noout 2>&1 || echo "KEY CHECK FAILED"

      - name: Initialize keychain and fetch signing files
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 -d | tr -d '\r' > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --certificate-key @file:/tmp/cert_key.pem
          keychain add-certificates

      - name: Install dependencies
        script: npm install

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli @capacitor/assets

      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Generate app icons
        script: |
          ICON_SRC="resources/icon.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          echo "Source icon dimensions:"
          sips -g pixelWidth -g pixelHeight "$ICON_SRC"
          echo "Replacing all icons in $ICON_DIR"
          for f in "$ICON_DIR"/*.png; do
            [ -f "$f" ] || continue
            w=$(sips -g pixelWidth "$f" | awk '/pixelWidth/{print $2}')
            h=$(sips -g pixelHeight "$f" | awk '/pixelHeight/{print $2}')
            echo "  -> $f (${w}x${h})"
            sips -z $h $w "$ICON_SRC" --out "$f"
          done
          echo "=== All icons replaced ==="

      - name: Copy web assets
        script: npx cap copy ios

      - name: Update iOS project
        script: npx cap update ios

      - name: Apply provisioning profiles
        script: xcode-project use-profiles

      - name: Set app version
        script: |
          echo "=== Version Debug ==="
          RAW_BUILD=$(app-store-connect get-latest-build-number "$APP_ID" \
            --platform IOS \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>&1) || true
          echo "Raw output: '$RAW_BUILD'"
          CURRENT_BUILD=$(echo "$RAW_BUILD" | grep -E '^[0-9]+$' | tail -1)
          CURRENT_BUILD=${CURRENT_BUILD:-5}
          echo "CURRENT_BUILD: $CURRENT_BUILD"
          NEW_BUILD=$((CURRENT_BUILD + 1))
          echo "NEW_BUILD: $NEW_BUILD"
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all $NEW_BUILD
        working_directory: ios/App

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/App.ipa \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
